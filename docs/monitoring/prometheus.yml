# Prometheus Configuration for Mizu SMTP Relay Monitoring
#
# This is an example Prometheus configuration for monitoring Mizu.
# Adjust scrape intervals, timeouts, and targets according to your deployment.

global:
  scrape_interval: 15s          # Default scrape interval
  scrape_timeout: 10s           # Default scrape timeout
  evaluation_interval: 15s      # Evaluate rules every 15 seconds

  # Attach these labels to any time series or alerts when communicating with
  # external systems (federation, remote storage, Alertmanager).
  external_labels:
    cluster: 'production'
    monitor: 'mizu-monitor'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 'alertmanager:9093'

# Load rules once and periodically evaluate them according to evaluation_interval
rule_files:
  - 'alert.rules.yml'
  - 'recording.rules.yml'

# Scrape configurations
scrape_configs:
  # Mizu SMTP Relay Server
  - job_name: 'mizu'

    # Metrics endpoint configuration from config.toml:
    # [metrics]
    # enabled = true
    # listen_addr = "localhost:9090"
    # path = "/metrics"
    # username = "admin"
    # password = "secret"

    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'mizu'
          env: 'production'

    # HTTP Basic Auth (if configured in mizu)
    basic_auth:
      username: 'admin'
      password: 'secret'

    # Scrape interval for high-resolution metrics
    scrape_interval: 15s
    scrape_timeout: 10s

    # Metrics path (default /metrics)
    metrics_path: '/metrics'

    # Scheme (http or https)
    scheme: http

  # Mizu Health Endpoint (for probe_success metric)
  - job_name: 'mizu_health'

    # Health endpoint configuration from config.toml:
    # [health]
    # enabled = true
    # listen_addr = "localhost:8080"
    # username = "admin"
    # password = "secret"

    static_configs:
      - targets: ['localhost:8080']
        labels:
          service: 'mizu'
          env: 'production'

    basic_auth:
      username: 'admin'
      password: 'secret'

    scrape_interval: 30s
    scrape_timeout: 10s
    metrics_path: '/health'
    scheme: http

  # Mizu Cluster Members (if using cluster mode)
  # Uncomment and adjust for multi-node deployments
  # - job_name: 'mizu-cluster'
  #   static_configs:
  #     - targets:
  #         - 'mizu-node-1:9090'
  #         - 'mizu-node-2:9090'
  #         - 'mizu-node-3:9090'
  #       labels:
  #         cluster: 'production'
  #         service: 'mizu'
  #   basic_auth:
  #     username: 'admin'
  #     password: 'secret'
  #   scrape_interval: 15s

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9091']

